<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DXF Processor Test</title>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-weight: bold; margin-bottom: 0.5rem; }
        input, select, button { padding: 0.5rem; font-size: 1rem; width: 100%; max-width: 400px; box-sizing: border-box;}
        button { background-color: #007bff; color: white; border: none; cursor: pointer; margin-top: 1rem;}
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .image-container { margin-top: 2rem; border-top: 2px solid #eee; padding-top: 1rem;}
        img { max-width: 100%; height: auto; border: 1px solid #ccc; margin-top: 1rem;}
        #loading, #layerLoading { display: none; color: #007bff; font-weight: bold; margin-top: 0.5rem; font-size: 0.9rem;}
    </style>
</head>
<body>

    <h1>Upload DXF for Processing</h1>
    
    <form id="uploadForm">
        <div class="form-group">
            <label for="dxfFile">1. Select DXF File:</label>
            <input type="file" id="dxfFile" name="file" accept=".dxf" required>
            <div id="layerLoading">Reading layers from file...</div>
        </div>

        <div class="form-group">
            <label for="layerName">2. Target Layer:</label>
            <select id="layerName" name="layer" required disabled>
                <option value="" disabled selected>Select a file first...</option>
            </select>
        </div>

        <div class="form-group">
            <label for="processType">3. Process Type:</label>
            <select id="processType" name="type">
                <option value="digit">Digits / Candidates</option>
                <option value="amplifier">Amplifiers</option>
                <option value="node">Nodes</option>
                <option value="extender">Extenders</option>
                <option value="generic">Generic Shapes</option>
            </select>
        </div>

        <button type="submit" id="submitBtn" disabled>Process DXF</button>
    </form>

    <div id="loading">Processing Map... This might take a moment depending on the file size.</div>

    <div id="results" class="image-container" style="display: none;">
        <h2>Results</h2>
        <pre id="jsonOutput" style="background: #f4f4f4; padding: 1rem; overflow-x: auto;"></pre>
        
        <h3>Map View</h3>
        <img id="mapImage" src="" alt="Processed Map Plot">

        <h3 id="gridTitle" style="display: none;">Candidate Grid</h3>
        <img id="gridImage" src="" alt="Candidate Grid Plot" style="display: none;">

        <h3>Export Options</h3>
        <div class="form-group">
            <label>
                <input type="checkbox" id="enablePlanner"> Enable Planner Integration
            </label>
        </div>
        <div class="form-group" id="projectGroup" style="display: none;">
            <label for="projectSelect">Select Project:</label>
            <select id="projectSelect">
                <option value="">Loading projects...</option>
            </select>
        </div>
        <button id="exportBtn" type="button">Export All to Excel</button>
        <div id="exportStatus" style="margin-top: 1rem; font-weight: bold;"></div>
    </div>

    <script>
        // --- NEW: Automatically fetch layers when file is selected ---
        document.getElementById('dxfFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const layerSelect = document.getElementById('layerName');
            const submitBtn = document.getElementById('submitBtn');
            const layerLoading = document.getElementById('layerLoading');
            
            if (!file) {
                layerSelect.innerHTML = '<option value="" disabled selected>Select a file first...</option>';
                layerSelect.disabled = true;
                submitBtn.disabled = true;
                return;
            }

            // Disable UI while loading
            layerSelect.disabled = true;
            submitBtn.disabled = true;
            layerLoading.style.display = 'block';
            layerSelect.innerHTML = '<option value="" disabled selected>Loading layers...</option>';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/get-layers', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Failed to fetch layers');

                // Populate dropdown
                layerSelect.innerHTML = '';
                data.layers.forEach(layer => {
                    const option = document.createElement('option');
                    option.value = layer;
                    option.textContent = layer;
                    layerSelect.appendChild(option);
                });

                // Re-enable UI
                layerSelect.disabled = false;
                submitBtn.disabled = false;

            } catch (error) {
                alert('Error loading layers: ' + error.message);
                layerSelect.innerHTML = '<option value="" disabled selected>Error loading layers</option>';
            } finally {
                layerLoading.style.display = 'none';
            }
        });

        // --- NEW: Handle Planner checkbox ---
        document.getElementById('enablePlanner').addEventListener('change', async (e) => {
            const checked = e.target.checked;
            const projectGroup = document.getElementById('projectGroup');
            const projectSelect = document.getElementById('projectSelect');
            
            if (checked) {
                projectGroup.style.display = 'block';
                projectSelect.innerHTML = '<option>Loading projects...</option>';
                try {
                    const response = await fetch('/api/planner/projects');
                    if (!response.ok) throw new Error('Failed to load projects');
                    const data = await response.json();
                    if (data.projects && data.projects.length > 0) {
                        projectSelect.innerHTML = '<option value="">Select a project...</option>';
                        data.projects.forEach(project => {
                            const option = document.createElement('option');
                            option.value = project.id;
                            option.textContent = `${project.project_name} (${project.project_code})`;
                            projectSelect.appendChild(option);
                        });
                    } else {
                        projectSelect.innerHTML = '<option value="">No projects available</option>';
                    }
                } catch (error) {
                    alert('Error loading projects: ' + error.message);
                    projectSelect.innerHTML = '<option value="">Error loading projects</option>';
                }
            } else {
                projectGroup.style.display = 'none';
                projectSelect.value = '';
            }
        });

        // --- NEW: Export All handler ---
        document.getElementById('exportBtn').addEventListener('click', async () => {
            const exportBtn = document.getElementById('exportBtn');
            const exportStatus = document.getElementById('exportStatus');
            const enablePlanner = document.getElementById('enablePlanner').checked;
            const projectSelect = document.getElementById('projectSelect');
            
            exportBtn.disabled = true;
            exportStatus.textContent = 'Fetching cable spans...';
            exportStatus.style.color = 'blue';

            try {
                // Fetch cable spans
                const spansResponse = await fetch('/api/cable_spans');
                if (!spansResponse.ok) {
                    throw new Error('Failed to fetch cable spans');
                }
                const spansData = await spansResponse.json();
                const cableSpans = spansData.spans || [];

                // Prepare export data
                const exportData = {
                    cable_spans: cableSpans,
                    corrections: {}  // Add corrections if needed later
                };

                // Add project_id if Planner enabled and selected
                if (enablePlanner) {
                    if (!projectSelect.value) {
                        throw new Error('Please select a project for Planner integration');
                    }
                    exportData.project_id = parseInt(projectSelect.value);
                }

                // Export all
                const exportResponse = await fetch('/api/export/all', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(exportData)
                });

                const exportResult = await exportResponse.json();

                if (!exportResponse.ok) {
                    throw new Error(exportResult.error || 'Export failed');
                }

                let statusMsg = `Excel exported successfully: <a href="/api/download?file=${exportResult.path}" target="_blank">Download</a>`;
                
                if (exportResult.planner_push) {
                    if (exportResult.planner_push.error) {
                        statusMsg += `<br>Planner push failed: ${exportResult.planner_push.error}`;
                        exportStatus.style.color = 'red';
                    } else {
                        statusMsg += '<br>Planner push successful.';
                        exportStatus.style.color = 'green';
                    }
                } else if (enablePlanner) {
                    statusMsg += '<br>Planner integration not enabled.';
                    exportStatus.style.color = 'orange';
                }

                exportStatus.innerHTML = statusMsg;

            } catch (error) {
                exportStatus.textContent = 'Error: ' + error.message;
                exportStatus.style.color = 'red';
            } finally {
                exportBtn.disabled = false;
            }
        });

                if (!exportResponse.ok) {
                    throw new Error(exportData.error || 'Export failed');
                }

                let statusMsg = `Excel exported successfully: <a href="/api/download?file=${exportData.path}" target="_blank">Download</a>`;
                
                if (exportData.planner_push) {
                    if (exportData.planner_push.error) {
                        statusMsg += `<br>Planner push failed: ${exportData.planner_push.error}`;
                        exportStatus.style.color = 'red';
                    } else {
                        statusMsg += '<br>Planner push successful.';
                        exportStatus.style.color = 'green';
                    }
                } else if (enablePlanner) {
                    statusMsg += '<br>Planner integration not enabled.';
                    exportStatus.style.color = 'orange';
                }

                exportStatus.innerHTML = statusMsg;

            } catch (error) {
                exportStatus.textContent = 'Error: ' + error.message;
                exportStatus.style.color = 'red';
            } finally {
                exportBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
